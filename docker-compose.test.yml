# Изолированный PostgreSQL для прогона автотестов backend (§13.7.2).
# Использование:
#   docker compose -f docker-compose.test.yml up -d
#   export TEST_DATABASE_URL=postgresql+asyncpg://postgres:test@localhost:5433/test
#   cd backend && pytest

services:
  testdb:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
