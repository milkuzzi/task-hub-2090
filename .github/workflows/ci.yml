# CI: линт + тесты backend (с реальным PostgreSQL) и тесты + сборка frontend.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - "5433:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        run: pip install -e '.[dev]'
      - name: Lint (ruff)
        run: ruff check app tests
      - name: Types (mypy)
        run: mypy app
        continue-on-error: true
      - name: Tests (pytest)
        run: pytest -q
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:test@localhost:5433/test
      - name: Migrations reversible (upgrade → downgrade → upgrade)
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:test@localhost:5433/test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Tests (vitest)
        run: npm test
      - name: Build
        run: npm run build
